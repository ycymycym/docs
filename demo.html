<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>横版过关 Demo</title>
    <style>
        body { margin: 0; overflow: hidden; background: #f0f0f0; font-family: sans-serif; }
        canvas { display: block; background: #87CEEB; } /* 天蓝色背景 */
        #ui { position: absolute; top: 20px; left: 20px; font-size: 24px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; }
    </style>
</head>
<body>

<div id="ui">分数: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('score');

// 游戏配置
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
const gravity = 0.8;
const friction = 0.9; // 摩擦力，用于实现平滑移动

// 玩家对象
const player = {
    x: 50,
    y: 200,
    width: 40,
    height: 40,
    velX: 0,
    velY: 0,
    speed: 5,
    jumpStrength: 15,
    grounded: false,
    color: "#e74c3c"
};

// 平台数据 (对应要求1的地面和平台)
const platforms = [
    { x: 0, y: canvas.height - 40, w: canvas.width, h: 40 }, // 地面
    { x: 300, y: canvas.height - 150, w: 150, h: 20 },
    { x: 550, y: canvas.height - 280, w: 150, h: 20 },
    { x: 800, y: canvas.height - 180, w: 150, h: 20 }
];

// 红心数据 (对应要求3)
let hearts = [
    { x: 350, y: canvas.height - 190, collected: false },
    { x: 600, y: canvas.height - 320, collected: false },
    { x: 850, y: canvas.height - 220, collected: false }
];

// 按键监听
const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function update() {
    // 1. 跑：左右平滑移动 (A/D)
    if (keys['KeyD'] || keys['ArrowRight']) {
        if (player.velX < player.speed) player.velX++;
    }
    if (keys['KeyA'] || keys['ArrowLeft']) {
        if (player.velX > -player.speed) player.velX--;
    }
    
    // 应用摩擦力 (平滑停止)
    player.velX *= friction;
    player.x += player.velX;

    // 2. 跳：空格触发 (仅地面)
    if ((keys['Space'] || keys['ArrowUp']) && player.grounded) {
        player.velY = -player.jumpStrength;
        player.grounded = false;
    }

    // 重力感应
    player.velY += gravity;
    player.y += player.velY;

    // 3. 碰撞检测 (地面与平台)
    player.grounded = false;
    for (let plat of platforms) {
        if (player.x < plat.x + plat.w &&
            player.x + player.width > plat.x &&
            player.y + player.height > plat.y &&
            player.y + player.height < plat.y + plat.h + player.velY) {
            
            player.grounded = true;
            player.velY = 0;
            player.y = plat.y - player.height;
        }
    }

    // 4. 红心收集逻辑 (触碰消失 + 加分)
    hearts.forEach(heart => {
        if (!heart.collected) {
            // 简单的矩形碰撞判定
            if (player.x < heart.x + 20 && player.x + player.width > heart.x &&
                player.y < heart.y + 20 && player.y + player.height > heart.y) {
                heart.collected = true;
                score += 10;
                scoreElement.innerText = score;
            }
        }
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 画平台
    ctx.fillStyle = "#2c3e50";
    platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

    // 画红心 (简单的红色圆点替代)
    ctx.fillStyle = "#ff2e63";
    hearts.forEach(h => {
        if (!h.collected) {
            ctx.beginPath();
            ctx.arc(h.x, h.y, 10, 0, Math.PI * 2);
            ctx.fill();
        }
    });

    // 画玩家
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
